<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizaa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container header-container">
            <img src="/logo.png" alt="Логотип піци" class="header-logo">
            <ul class="header-list">
                <li header-item>
                    <a href="" class="header-link">
                        Про нас
                    </a>
                </li>
                <li class="header-item">
                    <a href="" class="header-link">
                        Інгрідієнти
                    </a>
                </li>
            </ul>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="container hero-container">
                <img src="/hero-img.png" alt="Піца на дошці" hero-img>
                <div hero-wraper>
                    <h1 class="hero-title">Приготуємо смачнющу піцу!</h1>
                    <p class="hero-text">
                        Тонка, соковита, м'яка, ніжна, тепла, ароматна - це все про неї, про піцу! Ідеальне поєднання продуктів: тягнеться сир і капає сік з помідорів - чи це не рай для гурмана? Пропоную вам приготувати піцу разом!
                    </p>
                    <p class="hero text">
                        Побалуйте внутрішнього ласунчика
                    </p>
                </div>
            </div>
        </section>
        <section class="dough">
            
        </section>
    </main>
</body>

</html>
